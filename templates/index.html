<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANUU AI Assistant</title>
    {% load static %}
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/chatbot.css' %}">
    <!-- Unicons for beautiful icons -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <main class="chat-container glass custom-scrollbar">
        <header class="chat-header">
            <div class="header-content">
                <div class="brand">
                    <img src="{% static 'images/manuu_logo.png' %}" alt="MANUU Logo" class="brand-logo" onerror="this.src='https://manuu.edu.in/sites/default/files/logo-english-2023.png'">
                    <div class="brand-text">
                        <h1>MANUU AI Assistant</h1>
                        <span class="status"><span class="status-dot"></span> Online</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Clear Chat" id="clear-chat-btn">
                        <i class="uil uil-trash-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Quick Suggestions Scroller -->
            <div class="suggestions-wrapper">
                <div class="suggestions-scroller" id="quick-actions">
                    <button class="suggestion-chip" data-action="admission process">
                        <i class="uil uil-graduation-cap"></i> Admission
                    </button>
                    <button class="suggestion-chip" data-action="hostel details">
                        <i class="uil uil-building"></i> Hostels
                    </button>
                    <button class="suggestion-chip" data-action="canteen">
                        <i class="uil uil-coffee"></i> Canteen
                    </button>
                    <button class="suggestion-chip" data-action="exam dates">
                        <i class="uil uil-file-check-alt"></i> Exams
                    </button>
                    <button class="suggestion-chip" data-action="csit faculty">
                        <i class="uil uil-laptop"></i> CSIT Faculty
                    </button>
                    <button class="suggestion-chip" data-action="library">
                        <i class="uil uil-books"></i> Library
                    </button>
                </div>
            </div>
        </header>

        <section class="chat-body" id="chat-body">
            <!-- Initial Greeting -->
            <div class="message-wrapper bot fade-in">
                <img src="{% static 'images/manuu_logo.png' %}" alt="AI" class="avatar" onerror="this.src='https://manuu.edu.in/sites/default/files/logo-english-2023.png'">
                <div class="message">
                    <div class="message-content">
                        <p>Welcome! I'm your intelligent MANUU Assistant. I can provide officially verified information about Maulana Azad National Urdu University, including the CSIT department. How can I assist you today?</p>
                    </div>
                    <span class="time">Just now</span>
                </div>
            </div>
        </section>

        <!-- Typing Indicator Container (Hidden by default) -->
        <div class="typing-indicator-wrapper" id="typing-indicator" style="display: none;">
            <img src="{% static 'images/manuu_logo.png' %}" alt="AI" class="avatar" onerror="this.src='https://manuu.edu.in/sites/default/files/logo-english-2023.png'">
            <div class="glass typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <footer class="chat-footer">
            <div class="input-container glass">
                <button class="icon-btn attach-btn" title="Additional actions">
                    <i class="uil uil-plus"></i>
                </button>
                <input type="text" id="message-input" placeholder="Ask about admissions, campus, CSIT..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="uil uil-message"></i>
                </button>
            </div>
            <div class="footer-note">Powered by OpenAI & MANUU Data</div>
        </footer>
    </main>

    <!-- Passing STATIC_URL to JS to load images -->
    <script>
        window.STATIC_URL = "{% static '' %}";
        // Helper if static tag fails
        if (!window.STATIC_URL || window.STATIC_URL.includes("%")) {
            window.STATIC_URL = "/static/";
        }
    </script>
    <script src="{% static 'js/chatbot.js' %}"></script>
</body>
</html>
